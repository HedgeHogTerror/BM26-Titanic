# BM26 Titanic — Scene Configuration
# This file is the single source of truth for both scene state AND the GUI layout.
# The UI is dynamically generated from this structure.
# _section keys define GUI folders. Each control key carries UI metadata.
# Order in this file = order in the GUI.

# ─── Atmosphere ───────────────────────────────────────────────────────────
titanicEnd:
  _section:
    label: 🧊 Icebergs
    type: icebergArray
    collapsed: true
  icebergsEnabled:
    value: false
    label: Master Enabled
  focusOnSelect:
    value: false
    label: Focus on Select
  masterFloodEnabled:
    value: false
    label: Master Flood Enabled
  masterFloodColor:
    value: '#ffffff'
    label: Master Flood Color
    type: color
  masterFloodIntensity:
    value: 0
    label: Master Flood Intensity
    min: 0
    max: 500
    step: 1
  masterFloodAngle:
    value: 51
    label: Master Flood Angle °
    min: 10
    max: 90
    step: 1
  masterFloodDimmer:
    value: 0
    label: Master Flood Dimmer %
    min: 0
    max: 250
    step: 1
  icebergs: []
atmosphere:
  _section:
    label: 🌌 Atmosphere
    collapsed: true
  ambientIntensity:
    value: 0.8
    label: Global Ambient
    min: 0
    max: 1
    step: 0.01
  exposure:
    value: 1.1
    label: Camera Exposure
    min: 0.1
    max: 3
    step: 0.05
  moonlight:
    _section:
      label: 🌙 Moonlight
      collapsed: true
    moonEnabled:
      value: true
      label: Enabled
    moonIntensity:
      value: 0.5
      label: Intensity
      min: 0
      max: 3
      step: 0.05
    moonColor:
      value: '#aabbdd'
      label: Color
      type: color
    moonAngle:
      value: 60
      label: Elevation °
      min: 0
      max: 90
      step: 1
  bloom:
    _section:
      label: ✨ Bloom Glow
      collapsed: true
    bloomStrength:
      value: 0.4
      label: Strength
      min: 0
      max: 3
      step: 0.05
    bloomRadius:
      value: 1
      label: Radius
      min: 0
      max: 2
      step: 0.05
    bloomThreshold:
      value: 0.92
      label: Threshold
      min: 0
      max: 1
      step: 0.01

