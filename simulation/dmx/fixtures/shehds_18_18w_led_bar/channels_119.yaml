# SHEHDS 18x18W RGBWAV LED Bar — Corrected Channel Layout
#
# ⚠ HARDWARE VERIFIED: The physical fixture reports 119 channels, NOT 120
# as stated in the manual. The master channel order also differs from the
# manual. This layout was verified by Sina on 2026-03-28 by observing
# color output vs. expected values.
#
# Manual says 120ch:  Dimmer/Strobe/Dim-RGBWAV/Auto/Speed/8-16bit/BackColor + 108px
# Real firmware 119ch: Dimmer/Strobe/Function/Speed/BgColor/Dim-RGBWAV + 108px
#
# Pixels start at CH12 (not CH13). Total = 11 master + 108 pixel = 119.

fixture:
  name: "SHEHDS 18x18W RGBWAV LED Bar"
  mode: "119-channel (full, hardware-verified)"
  mode_id: "119ch"
  total_channels: 119
  pixel_count: 18
  channels_per_pixel: 6
  pixel_start_channel: 12
  pixel_order: [Red, Green, Blue, White, Amber, Violet]

channels:
  # ── Master Channels (CH1–11) — verified against hardware ──────────────
  - channel: 1
    function: "Dimmer"
    description: "Master dimmer — 0=off, 255=full"
  - channel: 2
    function: "Strobe"
    description: "Strobe speed — 0=off, 1-255=slow→fast"
  - channel: 3
    function: "Function"
    description: "Auto mode / effect selection"
  - channel: 4
    function: "Speed"
    description: "Auto mode speed — 0=slow, 255=fast"
  - channel: 5
    function: "BG Color"
    description: "Background color select — 0-255"
  - channel: 6
    function: "Dim-Red"
    description: "Master Red — 0=off, 255=full"
  - channel: 7
    function: "Dim-Green"
    description: "Master Green — 0=off, 255=full"
  - channel: 8
    function: "Dim-Blue"
    description: "Master Blue — 0=off, 255=full"
  - channel: 9
    function: "Dim-White"
    description: "Master White — 0=off, 255=full"
  - channel: 10
    function: "Dim-Amber"
    description: "Master Amber — 0=off, 255=full"
  - channel: 11
