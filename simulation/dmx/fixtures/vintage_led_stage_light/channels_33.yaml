# Vintage LED Stage Light (6 Vertical Retro Lights) — 33 Channel Mode
# ====================================================================
# OCR'd from the physical manual by Antigravity.
#
# Layout:
#   CH1–2    Master dimmer, Master strobe
#   CH3–8    Main light warm color 1–6 (individual head control)
#   CH9–11   Auxiliary light red, green, blue
#   CH12     Main light effect (see Appendix 1)
#   CH13     Main light effect speed / voice sensitivity
#   CH14     Auxiliary light effect (see Appendix 1)
#   CH15     Auxiliary light effect speed
#   CH16–18  Auxiliary light red 1, green 1, blue 1
#   ...      (per-head aux RGB repeats)
#   CH31–33  Auxiliary light red 6, green 6, blue 6

fixture:
  name: "Vintage LED Stage Light"
  mode: "33-channel"
  total_channels: 33

control_channels:
