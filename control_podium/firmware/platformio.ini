; =============================================================
; Heltec Raw LoRa — PlatformIO Configuration
; =============================================================
; Two environments: podium_tx (COM15) and server_rx (COM16)
; Both use the same Heltec V4 board (pin-compatible with V3 def)
;
; Flash:  pio run -e podium_tx -t upload
;         pio run -e server_rx -t upload
; Monitor: pio device monitor -e podium_tx
;          pio device monitor -e server_rx

[heltec_base]
platform = espressif32
framework = arduino
board = heltec_wifi_lora_32_V3
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool
upload_flags =
    --after
    hard_reset
lib_deps =
    https://github.com/ropg/heltec_esp32_lora_v3.git
    h2zero/NimBLE-Arduino@^2.1.2
; Use custom variant that defines SPI/OLED/LoRa pins as macros
; (not static const) to avoid conflict with heltec_unofficial.h
board_build.variants_dir = variants
board_build.variant = heltec_v3_ropg
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_heltec_wifi_32_lora_V3=1
    -Wno-macro-redefined

; ─── Podium TX ───────────────────────────────────────────
[env:podium_tx]
extends = heltec_base
upload_port = COM15
monitor_port = COM15
build_src_filter = -<*> +<podium_tx/>

; ─── Server RX ───────────────────────────────────────────
[env:server_rx]
extends = heltec_base
upload_port = COM16
monitor_port = COM16
build_src_filter = -<*> +<server_rx/>
