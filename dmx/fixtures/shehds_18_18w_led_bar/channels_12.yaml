    description: "White intensity — 0=off, 255=full"
  - channel: 10
    function: "Amber"
    description: "Amber intensity — 0=off, 255=full"
  - channel: 11
    function: "Violet"
    description: "Violet intensity — 0=off, 255=full"
  - channel: 12
