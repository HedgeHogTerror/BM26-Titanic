# Endyshow 240W Stage Strobe LED Bar — 82 Channel Mode
# ======================================================
# OCR'd and confirmed by Sina against the physical manual.
# Manual typo corrected: CH80 should be W16 (not AW16).
# ⚠ RGB pixel order corrected: actual order is R,G,B
#   (manual printed R,B,G for pixel 1 — verified on fixture).
#
# Layout:
#   CH1–48    16 RGB pixels (3 ch each: R,G,B)
#   CH49–64   16 Amber segments (1 ch each)
#   CH65–80   16 White segments (1 ch each)
#   CH81–82   RGB Strobe, ACW Strobe

