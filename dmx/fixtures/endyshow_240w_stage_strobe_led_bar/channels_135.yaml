# Endyshow 240W Stage Strobe LED Bar — 135 Channel Mode
# ======================================================
# OCR'd from manufacturer DMX chart image.
#
# PIXEL LAYOUT:
#   32 RGB pixels (CH1-CH96)   — 3 channels per pixel (R, B, G)
#   16 Amber pixels (CH97-CH112)
#   16 White pixels (CH113-CH128)
#   7 control channels (CH129-CH135)
#
# ⚠ NOTE: The manual shows pixel 1 as R,B,G order but pixel 32 as R,G,B.
#   This is likely a typo in the manual. Verify on the physical fixture
#   by sending CH2=255 and checking if Blue or Green lights up.
#   If Blue → order is R,B,G for all pixels.
#   If Green → order is R,G,B and pixel 1 has a typo.

fixture:
  name: "Endyshow 240W Stage Strobe LED Bar"
  mode: "135-channel"
  total_channels: 135

# ─── RGB Pixels (32 pixels × 3 channels = 96 channels) ───────────────────
# As printed in manual: CH1=R1, CH2=B1, CH3=G1
# Pattern repeats for all 32 pixels.
rgb_pixels:
  count: 32
  channels_per_pixel: 3
  channel_order: [red, green, blue]   # VERIFIED by user — physical order is R,G,B (manual had R,B,G typo)
  start_channel: 1
  end_channel: 96
  # Pixel triplet layout: CH(3n-2)=R, CH(3n-1)=G, CH(3n)=B
  pixels:
    - { pixel: 1,  r: 1,   g: 2,   b: 3   }
    - { pixel: 2,  r: 4,   g: 5,   b: 6   }
    - { pixel: 3,  r: 7,   g: 8,   b: 9   }
    - { pixel: 4,  r: 10,  g: 11,  b: 12  }
    - { pixel: 5,  r: 13,  g: 14,  b: 15  }
    - { pixel: 6,  r: 16,  g: 17,  b: 18  }
    - { pixel: 7,  r: 19,  g: 20,  b: 21  }
    - { pixel: 8,  r: 22,  g: 23,  b: 24  }
    - { pixel: 9,  r: 25,  g: 26,  b: 27  }
    - { pixel: 10, r: 28,  g: 29,  b: 30  }
    - { pixel: 11, r: 31,  g: 32,  b: 33  }
    - { pixel: 12, r: 34,  g: 35,  b: 36  }
    - { pixel: 13, r: 37,  g: 38,  b: 39  }
    - { pixel: 14, r: 40,  g: 41,  b: 42  }
    - { pixel: 15, r: 43,  g: 44,  b: 45  }
    - { pixel: 16, r: 46,  g: 47,  b: 48  }
    - { pixel: 17, r: 49,  g: 50,  b: 51  }
    - { pixel: 18, r: 52,  g: 53,  b: 54  }
    - { pixel: 19, r: 55,  g: 56,  b: 57  }
    - { pixel: 20, r: 58,  g: 59,  b: 60  }
    - { pixel: 21, r: 61,  g: 62,  b: 63  }
    - { pixel: 22, r: 64,  g: 65,  b: 66  }
    - { pixel: 23, r: 67,  g: 68,  b: 69  }
    - { pixel: 24, r: 70,  g: 71,  b: 72  }
    - { pixel: 25, r: 73,  g: 74,  b: 75  }
    - { pixel: 26, r: 76,  g: 77,  b: 78  }
    - { pixel: 27, r: 79,  g: 80,  b: 81  }
    - { pixel: 28, r: 82,  g: 83,  b: 84  }
    - { pixel: 29, r: 85,  g: 86,  b: 87  }
    - { pixel: 30, r: 88,  g: 89,  b: 90  }
    - { pixel: 31, r: 91,  g: 92,  b: 93  }
    - { pixel: 32, r: 94,  g: 95,  b: 96  }

# ─── Amber Pixels (16 × 1 channel = 16 channels) ─────────────────────────
amber_pixels:
  count: 16
  start_channel: 97
  end_channel: 112
  pixels:
    - { pixel: 1,  channel: 97  }
    - { pixel: 2,  channel: 98  }
    - { pixel: 3,  channel: 99  }
    - { pixel: 4,  channel: 100 }
    - { pixel: 5,  channel: 101 }
    - { pixel: 6,  channel: 102 }
    - { pixel: 7,  channel: 103 }
    - { pixel: 8,  channel: 104 }
    - { pixel: 9,  channel: 105 }
    - { pixel: 10, channel: 106 }
    - { pixel: 11, channel: 107 }
    - { pixel: 12, channel: 108 }
    - { pixel: 13, channel: 109 }
    - { pixel: 14, channel: 110 }
    - { pixel: 15, channel: 111 }
    - { pixel: 16, channel: 112 }

# ─── White Pixels (16 × 1 channel = 16 channels) ─────────────────────────
# Manual labels CH113 as "W1" and CH128 as "AW16"
white_pixels:
  count: 16
  start_channel: 113
  end_channel: 128
  pixels:
    - { pixel: 1,  channel: 113 }
    - { pixel: 2,  channel: 114 }
    - { pixel: 3,  channel: 115 }
    - { pixel: 4,  channel: 116 }
    - { pixel: 5,  channel: 117 }
    - { pixel: 6,  channel: 118 }
    - { pixel: 7,  channel: 119 }
    - { pixel: 8,  channel: 120 }
    - { pixel: 9,  channel: 121 }
    - { pixel: 10, channel: 122 }
    - { pixel: 11, channel: 123 }
    - { pixel: 12, channel: 124 }
    - { pixel: 13, channel: 125 }
    - { pixel: 14, channel: 126 }
    - { pixel: 15, channel: 127 }
    - { pixel: 16, channel: 128 }

# ─── Control Channels (CH129-CH135) ───────────────────────────────────────
control_channels:
  - channel: 129
    function: "RGB Strobe"
    ranges:
      - { min: 0,   max: 9,   description: "No function" }
      - { min: 10,  max: 255, description: "RGB Strobe (slow → fast)" }

  - channel: 130
    function: "ACW Strobe"
    ranges:
      - { min: 0,   max: 9,   description: "No function" }
      - { min: 10,  max: 255, description: "ACW Strobe (slow → fast)" }

  - channel: 131
    function: "RGB Effect Channel"
    ranges:
      - { min: 0,   max: 2,   description: "No function" }
      - { min: 3,   max: 5,   description: "Pattern 1 (CH1~3 can control the color)" }
      - { min: 6,   max: 8,   description: "Pattern 2 (CH1~3 can control the color)" }
      # Patterns 3-35 continue in steps of 3 (min: 9-11, 12-14, ... 105-107)
      - { min: 108, max: 110, description: "Pattern 36 (CH1~3 can control the color)" }
      - { min: 111, max: 113, description: "Pattern 37 (built-in pattern color)" }
      - { min: 114, max: 116, description: "Pattern 38 (built-in pattern color)" }
      # Patterns 39-67 continue in steps of 3
      - { min: 204, max: 206, description: "Pattern 68 (built-in pattern color)" }
      - { min: 207, max: 209, description: "Auto running 1~68 effect" }
      - { min: 210, max: 212, description: "Sound 1 (CH1~3 can control the color)" }
      - { min: 213, max: 215, description: "Sound 2 (CH1~3 can control the color)" }
      - { min: 216, max: 255, description: "Sound 3 (CH1~3 can control the color)" }

  - channel: 132
    function: "RGB Speed"
    ranges:
      - { min: 0, max: 255, description: "RGB Speed (slow → fast)" }

  - channel: 133
    function: "Effect Background Color Selection"
    ranges:
      - { min: 0, max: 255, description: "See RGB Background Color table in manual" }

  - channel: 134
    function: "ACW Effect Channel"
    ranges:
      - { min: 0,   max: 5,   description: "No function" }
      - { min: 6,   max: 11,  description: "Pattern 1 (CH97/113 can control the color)" }
      - { min: 12,  max: 17,  description: "Pattern 2 (CH97/113 can control the color)" }
      # Patterns 3-35 continue in steps of 6
      - { min: 216, max: 221, description: "Pattern 36 (CH97/113 can control the color)" }
      - { min: 222, max: 225, description: "Auto running 1~36 effect" }

  - channel: 135
    function: "ACW Speed"
    ranges:
      - { min: 0, max: 255, description: "ACW Speed (slow → fast)" }
