# Endyshow 240W Stage Strobe LED Bar — 130 Channel Mode
# =======================================================
# OCR'd and confirmed by Sina against the physical manual.
# Manual typo corrected: CH128 should be W16 (not AW16).
# ⚠ RGB pixel order corrected: actual order is R,G,B
#   (manual printed R,B,G for pixel 1 — verified on fixture).
#
# Layout:
#   CH1–96    32 RGB pixels (3 ch each: R,G,B)
#   CH97–112  16 Amber segments (1 ch each)
#   CH113–128 16 White segments (1 ch each)
#   CH129–130 RGB Strobe, ACW Strobe
# (Same pixel layout as 135-ch; no effect/speed channels in this mode)

